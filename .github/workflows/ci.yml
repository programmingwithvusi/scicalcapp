name: CI

on:
  push:
    branches: [ main ]
  name: CI

  on:
    push:
      branches: [ main ]
    pull_request:
      branches: [ main ]

  jobs:
    build-web:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up Node.js
          name: CI

          on:
            push:
              branches: [ main ]
            pull_request:
              branches: [ main ]

          jobs:
            build-web:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Set up Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: '18'
                - name: Install dev deps
                  run: |
                    cd tools || exit 0
                    if [ -f package.json ]; then npm ci; else npm i; fi
                - name: Generate icons
                  run: node ./tools/generate-icons.js
                - name: Upload www
                  uses: actions/upload-artifact@v4
                  with:
                    name: www-assets
                    path: www/

                - name: CI: write summary (always)
                  if: always()
                  run: node tools/ci-summary.js --context=build-web || true

                - name: CI: upload summary
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: ci-summary-build-web
                    path: ci-summary.txt

            android-build:
              runs-on: ubuntu-latest
              needs: build-web
              steps:
                - uses: actions/checkout@v4
                - name: Download www
                  uses: actions/download-artifact@v4
                  with:
                    name: www-assets
                    path: www/
                - name: Set up JDK 17
                  uses: actions/setup-java@v4
                  with:
                    distribution: 'temurin'
                    java-version: '17'
                - name: Setup Android SDK
                  uses: ./.github/actions/setup-android-sdk
                  with:
                    sdk-root: ${{ github.workspace }}/android-sdk
                    api-level: '33'
                    build-tools: '33.0.2'
                - name: Install Cordova
                  run: npm install -g cordova
                - name: Build debug APK
                  run: |
                    npm ci || npm i
                    cordova build android --no-telemetry
                - name: Upload debug APK
                  uses: actions/upload-artifact@v4
                  with:
                    name: android-apk
                    path: platforms/android/app/build/outputs/apk/debug/app-debug.apk

                - name: CI: write summary (always)
                  if: always()
                  run: node tools/ci-summary.js --context=android-build || true

                - name: CI: upload summary
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: ci-summary-android-build
                    path: ci-summary.txt