name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dev deps
        run: |
          cd tools || exit 0
          if [ -f package.json ]; then npm ci; else npm i; fi
      - name: Generate icons
        run: node ./tools/generate-icons.js
      - name: Upload www
        uses: actions/upload-artifact@v4
        with:
          name: www-assets
          path: www/

  android-build:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - name: Download www
        uses: actions/download-artifact@v4
        with:
          name: www-assets
          path: www/
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: ./.github/actions/setup-android-sdk
        with:
          sdk-root: ${{ github.workspace }}/android-sdk
          api-level: '33'
          build-tools: '33.0.2'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Build debug APK
        run: |
          npm ci || npm i
          cordova build android --no-telemetry
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install project dev deps
        run: |
          cd tools || exit 0
          if [ -f package.json ]; then npm ci; else npm i; fi

      - name: Generate icons
        run: |
          node ./tools/generate-icons.js

      - name: Validate web assets
        run: |
          echo "Checking that index.html and css exist"
          test -f www/index.html
          test -f www/css/index.css

      - name: Upload generated web assets
        uses: actions/upload-artifact@v4
        with:
          name: CI

          on:
            push:
              branches: [ main ]
            pull_request:
              branches: [ main ]

          jobs:
            build-web:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4

                - name: Set up Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: '18'

                - name: Install project dev deps
                  run: |
                    cd tools || exit 0
                    if [ -f package.json ]; then npm ci; else npm i; fi

                - name: Generate icons
                  run: |
                    node ./tools/generate-icons.js

                - name: Validate web assets
                  run: |
                    echo "Checking that index.html and css exist"
                    test -f www/index.html
                    test -f www/css/index.css

                - name: Upload generated web assets
                  uses: actions/upload-artifact@v4
                  with:
                    name: www-assets
                    name: CI

                    on:
                      push:
                        branches: [ main ]
                      pull_request:
                        branches: [ main ]

                    jobs:
                      build-web:
                        runs-on: ubuntu-latest
                        steps:
                          - uses: actions/checkout@v4
                          - name: Set up Node.js
                            uses: actions/setup-node@v4
                            with:
                              node-version: '18'
                          - name: Install dev deps
                            run: |
                              cd tools || exit 0
                              if [ -f package.json ]; then npm ci; else npm i; fi
                          - name: Generate icons
                            run: node ./tools/generate-icons.js
                          - name: Upload www
                            uses: actions/upload-artifact@v4
                            with:
                              name: www-assets
                              path: www/

                      android-build:
                        runs-on: ubuntu-latest
                        needs: build-web
                        steps:
                          - uses: actions/checkout@v4
                          - name: Download www
                            uses: actions/download-artifact@v4
                            with:
                              name: www-assets
                              path: www/
                          - name: Set up JDK 17
                            uses: actions/setup-java@v4
                            with:
                              distribution: 'temurin'
                              java-version: '17'
                          - name: Setup Android SDK
                            uses: ./.github/actions/setup-android-sdk
                            with:
                              sdk-root: ${{ github.workspace }}/android-sdk
                              api-level: '33'
                              build-tools: '33.0.2'
                          - name: Install Cordova
                            run: npm install -g cordova
                          - name: Build debug APK
                            run: |
                              npm ci || npm i
                              cordova build android --no-telemetry
                          - name: Upload debug APK
                            uses: actions/upload-artifact@v4
                            with:
                              name: android-apk
                              path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
                            run: |
                              echo "Checking that index.html and css exist"
                              test -f www/index.html
                              test -f www/css/index.css

                          - name: Upload generated web assets
                            uses: actions/upload-artifact@v4
                            with:
                              name: www-assets
                              path: www/

                      # Optional Android build: requires Android SDK set up on runner or self-hosted
                      android-build:
                        runs-on: ubuntu-latest
                        needs: build-web
                        env:
                          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
                        steps:
                          - uses: actions/checkout@v4

                          - name: Download generated web assets
                            uses: actions/download-artifact@v4
                            with:
                              name: www-assets
                              path: www/

                          - name: Set up JDK 17
                            uses: actions/setup-java@v4
                            with:
                              distribution: 'temurin'
                              java-version: '17'

                          - name: Setup Android SDK (composite action)
                            uses: ./.github/actions/setup-android-sdk
                            with:
                              sdk-root: ${{ github.workspace }}/android-sdk
                              api-level: '33'
                              build-tools: '33.0.2'

                          - name: Set PATH for Android tools
                            run: |
                              echo "PATH=$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV

                          - name: Set up Node.js
                            uses: actions/setup-node@v4
                            with:
                              node-version: '18'

                          - name: Install Cordova CLI
                            run: |
                              npm install -g cordova

                          - name: Install project dependencies
                            run: |
                              npm ci || npm i

                          - name: Build Android APK
                            run: |
                              cordova build android --no-telemetry

                          - name: Build Android Release APK
                            run: |
                              cordova build android --release --no-telemetry

                          - name: Prepare keystore (from secret ANDROID_KEYSTORE)
                            if: ${{ secrets.ANDROID_KEYSTORE != '' }}
                            env:
                              ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
                            run: |
                              echo "$ANDROID_KEYSTORE_B64" | base64 --decode > release.keystore

                          - name: Sign and align release APK
                            if: ${{ secrets.ANDROID_KEYSTORE != '' }}
                            env:
                              KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                              KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                              KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
                            run: |
                              unsigned=platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
                              aligned=app-release-unsigned-aligned.apk
                              signed=app-release-signed.apk
                              echo "Unsigned APK: $unsigned"
                              $ANDROID_SDK_ROOT/build-tools/33.0.2/zipalign -v -p 4 "$unsigned" "$aligned"
                              $ANDROID_SDK_ROOT/build-tools/33.0.2/apksigner sign --ks release.keystore --ks-key-alias $KEY_ALIAS --ks-pass pass:$KEYSTORE_PASSWORD --key-pass pass:$KEY_PASSWORD --out "$signed" "$aligned"

                          - name: Upload release APK (signed)
                            if: ${{ secrets.ANDROID_KEYSTORE != '' }}
                            uses: actions/upload-artifact@v4
                            with:
                              name: android-release-apk
                              path: app-release-signed.apk

                          - name: Upload release APK (unsigned, when no keystore provided)
                            if: ${{ secrets.ANDROID_KEYSTORE == '' }}
                            uses: actions/upload-artifact@v4
                            with:
                              name: android-release-unsigned-apk
                              path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

                          - name: Upload APK
                            uses: actions/upload-artifact@v4
                            with:
                              name: android-apk
                              path: platforms/android/app/build/outputs/apk/debug/app-debug.apk