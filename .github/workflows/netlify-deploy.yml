name: Netlify Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install netlify CLI
        run: npm install -g netlify-cli@9

      - name: (Optional) install project deps in tools
        run: |
          cd tools || exit 0
          if [ -f package.json ]; then npm ci; fi

      - name: Verify www folder
        run: |
          if [ ! -d "www" ]; then echo "www/ folder missing"; ls -la; exit 1; fi

      - name: Check Netlify secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then echo "Missing NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secrets"; exit 1; fi

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          echo "Deploying www/ to Netlify site: $NETLIFY_SITE_ID"
          netlify deploy --dir=www --prod --site $NETLIFY_SITE_ID

      - name: Upload www as artifact
        uses: actions/upload-artifact@v4
        with:
          name: www-for-netlify
          path: www/
