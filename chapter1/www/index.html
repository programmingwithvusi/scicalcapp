<!doctype html>
<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  SciCalcApp — Chapter 1: Introduction                   ║
  ║  App shell, splash screen, deviceready event            ║
  ╚══════════════════════════════════════════════════════════╝
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval';
                   style-src 'self' 'unsafe-inline';
                   script-src 'self' 'unsafe-inline' 'unsafe-eval';
                   media-src *; img-src 'self' data: content:;"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="initial-scale=1, width=device-width, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="css/index.css" />
    <title>SciCalcApp</title>
  </head>
  <body>
    <!-- ─────────────────────────────────────────────────────────
         CHAPTER 1 — Splash Screen
         Displayed immediately on load, before deviceready fires.
         Gives visual feedback that the app is initialising.
         ───────────────────────────────────────────────────────── -->
    <div id="splash-screen">
      <div class="splash-inner">
        <div class="splash-icon" aria-hidden="true">⚗️</div>
        <h1 class="splash-title">SciCalcApp</h1>
        <p class="splash-sub">For Engineers &amp; Scientists</p>

        <!-- deviceready indicator:
                 .listening shown while Cordova initialises
                 .received  shown once deviceready fires        -->
        <div id="deviceready" class="blink">
          <p class="event listening">Connecting to device…</p>
          <p class="event received">Device is ready ✓</p>
        </div>
      </div>
    </div>

    <!-- ─────────────────────────────────────────────────────────
         CHAPTER 1 — App Container
         Hidden until deviceready. Each chapter adds content here.
         ───────────────────────────────────────────────────────── -->
    <div id="app-container" class="hidden">
      <header class="app-header">
        <span class="header-icon" aria-hidden="true">⚗️</span>
        <span class="header-title">SciCalcApp</span>
        <span class="header-badge">Ch 1</span>
      </header>

      <main id="app-main">
        <div class="welcome-card">
          <h2>Welcome</h2>
          <p>
            Cordova has initialised successfully.<br />
            Running on <strong id="platform-name">your device</strong>.
          </p>
          <p class="chapter-note">
            📖 <em>Chapter 1 complete.</em><br />
            Next: build pipeline &amp; project scaffold.
          </p>
        </div>
      </main>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
